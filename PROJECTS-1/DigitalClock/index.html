<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" type="text/css" href="../styles.css" />
    <title>Your Local Time</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* Full Page */
body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#0f0f0f,#1a1a1a,#111111);
  color:#ffffff;
}

/* Navbar */
nav{
  width:100%;
  padding:18px 40px;
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

nav a{
  text-decoration:none;
  color:#ffffff;
  font-weight:500;
  padding:12px 22px;
  border-radius:12px;
  transition:0.3s ease;
  background:rgba(255,255,255,0.03);
}

nav a:hover{
  background:#e50914;
  transform:translateY(-2px);
}

nav a[aria-current='page']{
  background:#ffffff;
  color:#111111;
}

/* Center Content */
.center{
  min-height:calc(100vh - 85px);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}

/* Banner Text */
#banner{
  font-size:1.2rem;
  font-weight:600;
  color:#d1d1d1;
  margin-bottom:18px;
  letter-spacing:0.5px;
}

/* Clock Card */
#clock{
  min-width:320px;
  text-align:center;
  font-size:3rem;
  font-weight:800;
  padding:28px 45px;
  border-radius:24px;
  background:linear-gradient(135deg,#e50914,#ff3b30);
  color:#ffffff;
  box-shadow:0 25px 45px rgba(229,9,20,0.35);
  letter-spacing:2px;
  transition:0.3s ease;
}

#clock:hover{
  transform:scale(1.03);
  box-shadow:0 30px 55px rgba(229,9,20,0.45);
}

/* Mobile */
@media (max-width:768px){

  nav a{
    width:90%;
    text-align:center;
  }

  #clock{
    min-width:100%;
    font-size:2rem;
    padding:22px 20px;
  }

  #banner{
    font-size:1rem;
  }
}
</style>
  </head>
  <body>
    <nav>
      <a href="/" aria-current="page">Home</a>
      <a target="_blank" href="https://www.youtube.com/@chaiaurcode"
        >Youtube channel</a
      >
    </nav>
    <div class="center">
      <div id="banner"><span>Your local time</span></div>
      <div id="clock"></div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
